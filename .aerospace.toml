# Converted from my yabai + skhd config
# To fully set up aerospace, 
# - use only 1 macOS space 
# - disable "displays have separate spaces" `defaults write com.apple.spaces spans-displays -bool true && killall SystemUIServer`
#   - note: this conflicts with yabai
# - group windows by application `defaults write com.apple.dock expose-group-apps -bool true && killall Dock`
# - set `start-at-login = true` (line 10)

config-version = 2

start-at-login = false

# BSP layout equivalent
default-root-container-layout = 'tiles'

# yabai split_type = auto
default-root-container-orientation = 'auto'

accordion-padding = 30

enable-normalization-flatten-containers = true
enable-normalization-opposite-orientation-for-nested-containers = true

# yabai had mouse_follows_focus = on
on-focus-changed = ['move-mouse window-lazy-center']

automatically-unhide-macos-hidden-apps = false

[key-mapping]
    preset = 'qwerty'

# yabai gaps: top/bottom/left/right padding = 6, window_gap = 6
[gaps]
    inner.horizontal = 6
    inner.vertical =   6
    outer.left =       6
    outer.bottom =     6
    outer.top =        6
    outer.right =      6

# ── Floating rules (yabai manage=off apps) ────────────────────────

[[on-window-detected]]
    if.app-name-regex-substring = '^Finder$'
    run = 'layout floating'

[[on-window-detected]]
    if.app-name-regex-substring = '^FaceTime$'
    run = 'layout floating'

[[on-window-detected]]
    if.app-name-regex-substring = '^System Preferences$'
    run = 'layout floating'

[[on-window-detected]]
    if.app-name-regex-substring = '^System Settings$'
    run = 'layout floating'

[[on-window-detected]]
    if.app-name-regex-substring = '^App Store$'
    run = 'layout floating'

[[on-window-detected]]
    if.app-name-regex-substring = '^Calculator$'
    run = 'layout floating'

[[on-window-detected]]
    if.app-name-regex-substring = '^Dictionary$'
    run = 'layout floating'

[[on-window-detected]]
    if.app-name-regex-substring = 'Software Update'
    run = 'layout floating'

[[on-window-detected]]
    if.app-name-regex-substring = 'System Information'
    run = 'layout floating'

[[on-window-detected]]
    if.app-name-regex-substring = '^Unity Hub$'
    run = 'layout floating'

[[on-window-detected]]
    if.app-name-regex-substring = '^Notes$'
    run = 'layout floating'

[[on-window-detected]]
    if.app-name-regex-substring = '^Riot Client'
    run = 'layout floating'

[[on-window-detected]]
