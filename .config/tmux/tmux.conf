bind-key r source-file ~/.config/tmux/tmux.conf \; display-message "Tmux config reloaded!"

set -g history-limit 100000

# enable copy-pasting from terminal using vim-like mechanics
setw -g mode-keys vi
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-pipe "pbcopy"
bind P paste-buffer

# mouse mode settings
set -g mouse on
bind -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe "pbcopy"
bind -T copy-mode-vi WheelUpPane send-keys -X -N 1 scroll-up
bind -T copy-mode-vi WheelDownPane send-keys -X -N 1 scroll-down

# forward terminal bells
set -g monitor-bell on
set -g bell-action any
set -g visual-bell off

# g table
bind -T copy-mode-vi g switch-client -T gx-table
bind -T gx-table g send-keys -X history-top
bind -T gx-table _ send-keys -X end-of-line \; send-keys -X previous-space \; send-keys -X next-space-end
## Vim-like URL opening with gx in copy mode (macOS version)
bind -T gx-table x run-shell '
    # #{copy_cursor_line} = exact line under the copy-mode cursor, expanded by
    # tmux at fire time (immune to scrolling / wrapping / line-number math)
    LINE="#{copy_cursor_line}"
    URL=$(printf "%s\n" "$LINE" | grep -oE "(https?|ftp|file)://[^[:space:]]*" | head -1)
    if [ -n "$URL" ]; then
        open "$URL"
        tmux display-message "Opening: $URL"
    else
        tmux display-message "No URL found"
    fi
'