bind-key r source-file ~/.config/tmux/tmux.conf \; display-message "Tmux config reloaded!"

set -g history-limit 100000

# enable copy-pasting from terminal using vim-like mechanics
setw -g mode-keys vi
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-pipe "pbcopy"
bind P paste-buffer

# mouse mode settings
set -g mouse on
bind -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe "pbcopy"
bind -T copy-mode-vi WheelUpPane send-keys -X -N 1 scroll-up
bind -T copy-mode-vi WheelDownPane send-keys -X -N 1 scroll-down

# g table
bind -T copy-mode-vi g switch-client -T gx-table
bind -T gx-table g send-keys -X history-top
bind -T gx-table _ send-keys -X end-of-line \; send-keys -X previous-space \; send-keys -X next-space-end
## Vim-like URL opening with gx in copy mode (macOS version)
bind -T gx-table x run-shell '
    # Capture the current pane content
    tmux capture-pane -J -p > /tmp/tmux-screen
    
    # Get cursor position
    eval $(tmux display-message -p "CURSOR_Y=#{cursor_y}")
    
    # Calculate line number (tmux uses 0-based, we need 1-based for sed)
    LINE_NUM=$((CURSOR_Y + 1))
    
    # Extract the line at cursor position
    LINE=$(sed -n "${LINE_NUM}p" /tmp/tmux-screen)
    
    # Find URL on the current line
    URL=$(echo "$LINE" | grep -oE "(https?|ftp|file)://[^[:space:]]*")
    
    # If no URL on current line, search the whole pane
    if [ -z "$URL" ]; then
        URL=$(grep -oE "(https?|ftp|file)://[^[:space:]]*" /tmp/tmux-screen | head -1)
    fi
    
    # Open URL using macOS open command
    if [ -n "$URL" ]; then
        open "$URL"
        tmux display-message "Opening: $URL"
    else
        tmux display-message "No URL found"
    fi
    
    # Clean up
    rm -f /tmp/tmux-screen
'